name: CI/CD – Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  IMAGE_NAME: investigacion-operativa

jobs:
  # ── 1. Lint / unit-test del backend (Python) ─────────────────────────────
  backend-test:
    name: Backend – Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Smoke-test – importar servicios
        working-directory: backend
        run: |
          python -c "from services.matrix_service import MatrixService; print('MatrixService OK')"
          python -c "from services.markov_service import MarkovService; print('MarkovService OK')"
          python -c "from services.queue_service import QueueService; print('QueueService OK')"

  # ── 2. Build de la imagen Docker ──────────────────────────────────────────
  docker-build:
    name: Docker – Build & Smoke-test
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t investigacion-operativa:ci .

      - name: Smoke-test – contenedor responde HTTP 200
        run: |
          docker run -d -p 5000:8080 --name test-app investigacion-operativa:ci
          # Esperar hasta que el servidor esté listo (máx 30 s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/ > /dev/null; then
              echo "Servidor listo."
              break
            fi
            echo "Esperando… ($i)"
            sleep 2
          done
          curl -sf http://localhost:5000/
          docker stop test-app

  # ── 3. Publicar imagen en Docker Hub (solo al hacer merge a main) ─────────
  deploy:
    name: Deploy – Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    # Solo se ejecuta en push directo a main (no en PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build & push Docker image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
